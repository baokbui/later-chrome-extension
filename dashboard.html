<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Later — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <main class="app">
    <header class="head">
      <h1>Later</h1>
      <p class="sub">Park a tab with a reason. Come back when you said you would.</p>
    </header>

    <form id="add-form" class="form">
      <input id="url" type="text" placeholder="Paste a URL (optional)" autocomplete="off" spellcheck="false" />
      <input id="why" type="text" placeholder="Why are you saving this?" autocomplete="off" />
      <div class="row">
        <select id="when">
          <option value="1h">Remind in 1 hour</option>
          <option value="today">Later today at 6 pm</option>
          <option value="tomorrow" selected>Tomorrow morning</option>
          <option value="3d">In 3 days</option>
          <option value="week">Next week</option>
        </select>
        <button id="save-btn" type="submit">Save</button>
      </div>
    </form>

    <section id="list" class="list"></section>
  </main>

  <script src="later.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
